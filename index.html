<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up Form</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="left-panel">
        <div class="logo-title">
            <img class="logo" src="./img/odin-lined.png" alt="Odin logo">
            <div class="title">ODIN</div>
        </div>
        <div class="attribution">Photo by <a class="attr-link" href="https://unsplash.com/photos/green-leaf-plant-in-close-up-photography-25xggax4bSA" target="_blank" rel="noreferrer noopener">Haile West</a> on <a class="attr-link" href="https://unsplash.com/" target="_blank" rel="noreferrer noopener">Unsplash</a>.</div>
    </div>
    <div class="right-panel">
        <div class="hero-section">
            <p class="hero-text">This is not a real online service! You know you need something like this in your life to help you realize your deepest dreams. Sign up now to get started!</p>
            <p class="hero-text">You <em>know</em> you want to!</p>
        </div>
        <div class="form-section">
            <p class="call-to-action">Let's do this!</p>
            <form action="#" method="get" class="signup-form">
                <div class="form-item">
                    <label for="first-name">FIRST NAME</label>
                    <input type="text" name="first-name" id="first-name">
                </div>
                <div class="form-item">
                    <label for="last-name">LAST NAME</label>
                    <input type="text" name="last-name" id="last-name">
                </div>
                <div class="form-item">
                    <label for="email">EMAIL</label>
                    <input type="email" name="email" id="email">
                </div>
                <div class="form-item">
                    <label for="phone">PHONE NUMBER</label>
                    <input type="tel" name="phone" id="phone">
                </div>
                <div class="form-item">
                    <label for="pwd">PASSWORD</label>
                    <input type="password" name="pwd" id="pwd">
                </div>
                <div class="form-item">
                    <label for="pwd-confirm">CONFIRM PASSWORD</label>
                    <input type="password" name="pwd-confirm" id="pwd-confirm">
                </div>
            </form>
        </div>
        <div class="submission-section"></div>
    </div>
</body>
</html>
